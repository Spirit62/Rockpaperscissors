<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JS</title>
  <link rel="stylesheet" href="rockpaperscissors.css">
</head>
<body>
  <p class="header">Rock Paper Scissors</p>
  
  <button class="rpc" onclick="playGame('Rock');"><img class="move-icon" src="images/Rock-emoji.png"></button>
  <button class="rpc" onclick="playGame('Paper');"><img class="move-icon" src="images/Paper-emoji.png"></button>
  <button class="rpc" onclick="playGame('Scissors');"><img class="move-icon" src="images/Scissors-emoji.png"></button>
  <p class="js-result result"></p>
  <p class="js-move move">
  </p>
  <p class="js-score score"></p>
  <button class="reset" onclick="resetScore(); localStorage.removeItem('score')">Reset Score</button>

  <script>
    let userMove = "";
    let compMove = "";
    let result = "";
    const score = JSON.parse(localStorage.getItem('score')) ||{
        Wins:0,
        Loss:0,
        Ties:0
      };
    updateScoreElement();
    function computerChoice() {
      let choice = Math.random();

      if (choice >= 0 && choice < 0.333) {
        compMove = "Rock";
      } else if (choice >= 0.333 && choice < 0.666) {
        compMove = "Paper";
      } else if (choice >= 0.666 && choice < 1) {
        compMove = "Scissors";
      }
      
      return compMove;
    }

    function playGame(moveReceived) {
      userMove = moveReceived;
      compMove = computerChoice();

      if (userMove === 'Rock') {
        if (compMove === 'Paper') {
          result = "Lost";
        } else if (compMove === 'Rock') {
          result = "Tie";
        } else if (compMove === 'Scissors') {
          result = "Won";
        }
      }

      if (userMove === 'Paper') {
        if (compMove === 'Paper') {
          result = "Tie";
        } else if (compMove === 'Rock') {
          result = "Won";
        } else if (compMove === 'Scissors') {
          result = "Lost";
        }
      }

      if (userMove === 'Scissors') {
        if (compMove === 'Paper') {
          result = "Won";
        } else if (compMove === 'Rock') {
          result = "Lost";
        } else if (compMove === 'Scissors') {
          result = "Tie";
        }
      }

      if (result === "Won"){
        score.Wins+=1;
      }
      else if (result === "Lost"){
        score.Loss+=1;
      }
      else{
        score.Ties+=1;
      }
      localStorage.setItem('score', JSON.stringify(score))
      moveResultElement();
      scoreResultElement();
      updateScoreElement();
    }
    function resetScore(){
      score.Wins =0;
      score.Loss =0;
      score.Ties =0;
      updateScoreElement();
      document.querySelector('.js-move').innerHTML = '';
      document.querySelector('.js-result').innerHTML = '';
    }
    function updateScoreElement(){
      document.querySelector('.js-score')
      .innerHTML=`Wins: ${score.Wins}, Loss: ${score.Loss}, Ties: ${score.Ties}`
    }
    function scoreResultElement(){
      document.querySelector('.js-result')
        .innerHTML=`You ${result}`
    }
    function moveResultElement(){
      document.querySelector('.js-move')
        .innerHTML=`You
    <img class="move-icon" src="images/${userMove}-emoji.png">
    <img class="move-icon" src="images/${compMove}-emoji.png">
    Computer`
    }
  </script>
</body>
</html>
