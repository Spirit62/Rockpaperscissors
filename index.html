<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JS</title>
  <link rel="stylesheet" href="rockpaperscissors.css">
</head>
<body>
  <main class="all-container">
    <div class="main-left">
      <div class="js-ays pop-up">
      </div>
      <p class="header">Rock Paper Scissors</p>
      <button class="rpc js-rock"><img class="move-icon" src="images/Rock-emoji.png"></button>
      <button class="rpc js-paper"><img class="move-icon" src="images/Paper-emoji.png"></button>
      <button class="rpc js-scissors"><img class="move-icon" src="images/Scissors-emoji.png"></button>
      <p class="js-result result"></p>
      <p class="js-move move">
      </p>
      <p class="js-score score"></p>
      <button class="js-reset reset">Reset Score</button>
      <button class="js-auto auto">AutoPlay</button>
    </div>
    <div class="main-right">
      <h3>Shortcuts</h3>
        <p>press r: rock</p>
        <p>press p: paper</p>
        <p>press s: scissors</p>
        <p>press  a: autoplay</p>
        <p>press backspace: remove</p>
        <p>press r: rock</p>
        <p>(Or manually press buttons!)</p>
      
    </div>
  </main>
  <script src="index.js">
  </script>
</body>
</html>
