<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JS</title>
  <link rel="stylesheet" href="rockpaperscissors.css">
</head>
<body>
  <p class="header">Rock Paper Scissors</p>
  
  <button class="rpc" onclick="playGame('Rock');"><img class="move-icon" src="images/Rock-emoji.png"></button>
  <button class="rpc" onclick="playGame('Paper');"><img class="move-icon" src="images/Paper-emoji.png"></button>
  <button class="rpc" onclick="playGame('Scissors');"><img class="move-icon" src="images/Scissors-emoji.png"></button>
  <p class="js-result result"></p>
  <p class="js-move move">
  </p>
  <p class="js-score score"></p>
  <button class="reset" onclick="resetScore(); localStorage.removeItem('score')">Reset Score</button>
  <button class="auto" onclick="autoPlay();">AutoPlay</button>

  <script src="index.js">
  </script>
</body>
</html>
